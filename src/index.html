<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Pattern JSON Generator + Preview</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RJ8487N9XW"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-RJ8487N9XW');
    </script>
    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="circle-tool.css" />
    <link rel="stylesheet" href="image-import.css" />
  </head>
  <body>
    <div class="page">
      <header class="top-bar">
        <div class="title-block">
          <p class="eyebrow">Pattern Utility</p>
          <h1>Pattern Editor</h1>
        </div>
        <div class="top-actions">
          <button id="undoBtn" disabled>Undo</button>
          <button id="redoBtn" disabled>Redo</button>
          <div class="mode-switch" aria-label="Display mode">
            <button type="button" data-view-mode="both" class="selected">Both</button>
            <button type="button" data-view-mode="canvas">Canvas</button>
            <button type="button" data-view-mode="preview">Preview</button>
          </div>
          <button id="floatPreviewBtn" type="button">Float Preview</button>
          <button id="toolbarToggleBtn" type="button" aria-expanded="true">Toolbar</button>
        </div>
      </header>

      <main class="editor-shell" data-view-mode="both">
        <section class="workspace-panel" aria-label="Canvas and preview workspace">
          <div class="workspace-split">
            <section class="canvas-panel">
              <div class="workspace-toolbar">
                <div class="panel-title">Canvas</div>
                <div class="workspace-actions">
                  <button id="zoomOutBtn" type="button">-</button>
                  <output id="zoomValue">100%</output>
                  <button id="zoomInBtn" type="button">+</button>
                  <button id="resetViewBtn" type="button">Reset View</button>
                </div>
              </div>
              <div id="canvasWorkspace" class="canvas-workspace">
                <div id="gridViewport" class="grid-viewport">
                  <div id="grid" class="grid"></div>
                </div>
              </div>
            </section>

            <div
              id="previewResizeHandle"
              class="resize-handle preview-resize-handle"
              role="separator"
              aria-label="Resize preview"
            ></div>

            <section class="preview-panel" aria-label="Pattern preview">
              <div class="preview-header">
                <div class="panel-title">Preview</div>
                <button id="dockPreviewBtn" type="button" hidden>Dock</button>
              </div>
              <canvas id="preview"></canvas>
            </section>
          </div>
        </section>

        <div
          id="toolbarResizeHandle"
          class="resize-handle toolbar-resize-handle"
          role="separator"
          aria-label="Resize toolbar"
        ></div>

        <aside class="right-toolbar" aria-label="Editor controls">
          <div class="toolbar-scroll">
            <section class="toolbar-section">
              <div class="panel-title">Tools</div>
              <div id="toolbox" class="toolbox">
                <div class="tool-group">
                  <button id="tool-pen" class="tool-btn" data-tool="pen">Pen</button>
                  <input type="range" id="pen-size" min="1" max="9" step="2" value="1" class="tool-range" aria-label="Pen size" title="Pen size" />
                </div>
                <div class="tool-group">
                  <button id="tool-line" class="tool-btn" data-tool="line" title="Click start point, then end point">Line</button>
                </div>
                <div class="tool-group">
                  <button id="tool-fill" class="tool-btn" data-tool="fill">Fill</button>
                </div>
                <div class="tool-group">
                  <button id="tool-star" class="tool-btn" data-tool="star">Star</button>
                  <input type="range" id="star-size" min="2" max="10" value="3" class="tool-range" />
                </div>
                <div class="tool-group">
                  <button id="tool-circle" class="tool-btn" data-tool="circle">Circle</button>
                  <input type="range" id="circle-size" min="2" max="15" value="5" class="tool-range" />
                  <label class="tool-toggle"><input type="checkbox" id="circle-fill" checked /> Fill</label>
                </div>
                <div class="tool-group">
                  <button id="tool-stamp" class="tool-btn" data-tool="stamp">Stamp</button>
                  <input type="range" id="stamp-brush-size" min="1" max="9" step="1" value="2" class="tool-range" aria-label="Stamp brush size" title="Stamp brush size" />
                </div>
              </div>
            </section>

            <section class="toolbar-section">
              <div class="panel-title">Grid</div>
              <div class="row slider-row">
                <label for="tileWidth">Width</label>
                <input type="range" id="tileWidth" value="66" min="2" max="129" class="range-input" />
                <input type="number" min="2" max="129" id="tileWidth-value" value="66" class="number-input" />
              </div>
              <div class="row slider-row">
                <label for="tileHeight">Height</label>
                <input type="range" id="tileHeight" value="10" min="2" max="65" class="range-input" />
                <input type="number" min="2" max="129" id="tileHeight-value" value="10" class="number-input" />
              </div>
              <details>
                <summary>Advanced Grid</summary>
                <div class="details-body">
                  <div class="row slider-row">
                    <label for="scale">Scale</label>
                    <input type="range" id="scale" value="1" min="0" max="7" class="range-input" />
                    <div class="scale-badge"><span id="scale-value">2</span>x</div>
                  </div>
                  <div class="row slider-row grid-size-row">
                    <label for="gridScale">Grid Size</label>
                    <select id="gridScale" class="select-input">
                      <option value="0.25">x0.25</option>
                      <option value="0.5">x0.5</option>
                      <option value="1" selected>x1</option>
                      <option value="2">x2</option>
                      <option value="3">x3</option>
                    </select>
                  </div>
                </div>
              </details>
            </section>

            <section class="toolbar-section">
              <div class="panel-title">Actions</div>
              <div class="action-row">
                <button id="clearGridBtn">Clear</button>
                <button id="invertGridBtn">Invert</button>
              </div>
              <div class="action-row">
                <button id="tool-select" class="tool-btn" data-tool="select">Rotate Select</button>
                <button id="rotateLeftBtn">Rotate Left</button>
                <button id="rotateRightBtn">Rotate Right</button>
              </div>
              <details>
                <summary>Shift</summary>
                <div class="details-body">
                  <div class="toggle-pill" role="tablist" aria-label="Shift selection mode">
                    <input type="radio" name="shift-selection-mode" id="shift-mode-all" checked />
                    <input type="radio" name="shift-selection-mode" id="shift-mode-partial" />
                    <label for="shift-mode-all" class="toggle-pill-option">All</label>
                    <label for="shift-mode-partial" class="toggle-pill-option">Partial</label>
                  </div>
                  <button id="shift-select-btn" class="tool-btn shift-select-hidden">Shift Select</button>
                  <div class="toggle-pill toggle-pill-secondary" role="tablist" aria-label="Shift overwrite mode">
                    <input type="radio" name="shift-overwrite-mode" id="shift-overwrite-on" checked />
                    <input type="radio" name="shift-overwrite-mode" id="shift-overwrite-off" />
                    <label for="shift-overwrite-on" class="toggle-pill-option">Overwrite</label>
                    <label for="shift-overwrite-off" class="toggle-pill-option">Keep Filled</label>
                  </div>
                  <div class="shift-pad">
                    <button id="shiftUpBtn">Up</button>
                    <button id="shiftLeftBtn">Left</button>
                    <button id="shiftRightBtn">Right</button>
                    <button id="shiftDownBtn">Down</button>
                  </div>
                </div>
              </details>
            </section>

            <section id="stampSection" class="toolbar-section">
              <div class="panel-title">Stamp</div>
              <div class="row slider-row stamp-size-row">
                <label for="stampWidth">Pattern W</label>
                <input type="number" id="stampWidth" min="1" max="24" value="4" class="number-input" />
                <label for="stampHeight">H</label>
                <input type="number" id="stampHeight" min="1" max="24" value="4" class="number-input" />
              </div>
              <div class="row input-row">
                <label for="stampApplyMode">Apply</label>
                <select id="stampApplyMode" class="select-input">
                  <option value="overwrite" selected>Overwrite</option>
                  <option value="overlay">Overlay</option>
                </select>
              </div>
              <div class="stamp-editor-wrap">
                <div class="stamp-editor-toolbar">
                  <span class="panel-title">Pattern</span>
                  <button id="stampClearBtn" type="button">Clear</button>
                </div>
                <div id="stampEditor" class="stamp-editor" aria-label="Stamp pattern editor"></div>
              </div>
              <button id="stampApplyBtn" class="btn-primary">Apply Stamp</button>
            </section>

            <section class="toolbar-section">
              <div class="panel-title">Preview Colors</div>
              <div class="selected-preset" id="selectedPresetLabel">Custom colors</div>
              <div class="row color-row">
                <label for="previewPrimaryColor">Primary</label>
                <input type="color" id="previewPrimaryColor" value="#ffffff" />
              </div>
              <div class="row color-row">
                <label for="previewSecondaryColor">Secondary</label>
                <input type="color" id="previewSecondaryColor" value="#000000" />
              </div>
              <button id="swapColorsBtn">Swap Colors</button>
              <details class="color-preset-details">
                <summary>Color Presets</summary>
                <div id="colorPresetContainer" class="color-preset-container loading">
                  <div class="color-preset-placeholder">Loading presets...</div>
                </div>
              </details>
            </section>

            <section class="toolbar-section">
              <div class="panel-title">Export / Import</div>
              <details>
                <summary>Export</summary>
                <div class="details-body export-stack">
                  <label for="output">JSON</label>
                  <textarea id="output" readonly></textarea>
                  <button id="copyOutputBtn" class="btn-primary">Copy JSON</button>
                  <label for="discordOutput">Discord</label>
                  <textarea id="discordOutput" readonly></textarea>
                  <button id="copyDiscordBtn" class="btn-primary">Copy For Discord</button>
                  <label for="previewLinkOutput">Preview Link</label>
                  <textarea id="previewLinkOutput" readonly></textarea>
                  <button id="copyPreviewLinkBtn" class="btn-primary">Copy Preview Link</button>
                  <label for="devStorageOutput">Dev localStorage</label>
                  <textarea id="devStorageOutput" readonly></textarea>
                  <button id="copyDevStorageBtn" class="btn-primary">Copy Dev localStorage</button>
                </div>
              </details>
              <details>
                <summary>Import Base64</summary>
                <div class="details-body">
                  <input type="text" id="base64Input" class="text-input" placeholder="Paste Base64 pattern" />
                  <button id="loadBtn" class="btn-primary">Load</button>
                </div>
              </details>
              <div id="imageImportEntry" class="image-import-entry"></div>
            </section>
          </div>
        </aside>
      </main>
    </div>
    <script type="module" src="app.js"></script>
    <script type="module" src="index.js"></script>
  </body>
</html>
